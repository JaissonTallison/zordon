services:

  zordon_db:
    image: postgres:15
    container_name: zordon_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zordon
    ports:
      - "5432:5432"

  zordon_api:
    build: .
    container_name: zordon_api
    ports:
      - "3333:3333"
    depends_on:
      - zordon_db
    env_file:
      - .env
